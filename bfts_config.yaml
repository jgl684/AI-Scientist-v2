# path to the task data directory
data_dir: "data"
preprocess_data: False

goal: null
eval: null

log_dir: logs
workspace_dir: workspaces

# whether to copy the data to the workspace directory (otherwise it will be symlinked)
# copying is recommended to prevent the agent from accidentally modifying the original data
copy_data: True

exp_name: run # a random experiment name will be generated if not provided

# ============================================================
# 统一模型配置（所有模型名称集中在此配置）
# ============================================================
models:
  # 实验代码生成模型
  code: deepseek-v4-pro
  # 代码执行结果评估模型
  feedback: deepseek-v4-flash
  # 图表分析多模态模型（需要视觉能力）
  vlm_feedback: qwen-vl-max
  # 论文撰写模型（主模型，用于生成 LaTeX 正文）
  writeup: deepseek-v4-pro
  # 论文撰写模型（辅助模型，用于图表描述等轻量任务）
  writeup_small: deepseek-v4-flash
  # 引用收集模型
  citation: deepseek-v4-flash
  # 论文审阅模型
  review: deepseek-v4-pro
  # 图表聚合模型
  agg_plots: deepseek-v4-pro
  # 实验报告生成模型
  report: deepseek-v4-pro
  # 日志摘要模型
  summary: deepseek-v4-flash
  # 最佳节点选择模型
  select_node: deepseek-v4-pro
  # 创意生成模型
  ideation: deepseek-v4-pro

# settings for code execution
exec:
  timeout: 3600
  agent_file_name: runfile.py
  format_tb_ipython: False

generate_report: True
# LLM settings for final report from journal
report:
  model: gpt-4o-2024-11-20
  temp: 1.0

experiment:
  num_syn_datasets: 1

debug:
  stage4: False

# agent hyperparams
agent:
  type: parallel
  num_workers: 4
  stages:
    stage1_max_iters: 20
    stage2_max_iters: 12
    stage3_max_iters: 12
    stage4_max_iters: 18
  # how many improvement iterations to run
  steps: 5 # if stage-specific max_iters are not provided, the agent will use this value for all stages
  # whether to instruct the agent to use CV (set to 1 to disable)
  k_fold_validation: 1
  multi_seed_eval:
    num_seeds: 3 # should be the same as num_workers if num_workers < 3. Otherwise, set it to be 3.
  # whether to instruct the agent to generate a prediction function
  expose_prediction: False
  # whether to provide the agent with a preview of the data
  data_preview: False

  # LLM settings for coding
  code:
    model: deepseek-v4-pro
    temp: 1.0
    max_tokens: 12000

  # LLM settings for evaluating program output / tracebacks
  feedback:
    model: deepseek-v4-flash
    temp: 0.5
    max_tokens: 8192

  vlm_feedback:
    model: qwen-vl-max
    temp: 0.5
    max_tokens: null

  search:
    max_debug_depth: 3
    debug_prob: 0.5
    num_drafts: 3

  # 日志摘要和最佳节点选择
  summary:
    model: deepseek-v4-flash
    temp: 0.3

  select_node:
    model: deepseek-v4-pro
    temp: 0.3
